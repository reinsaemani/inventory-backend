name: Docker CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/inventory-backend

jobs:
  build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push version tag
        run: |
          docker pull $IMAGE:latest
          docker tag $IMAGE:latest $IMAGE:${{ github.ref_name }}
          docker push $IMAGE:${{ github.ref_name }}

  deploy:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            cd ~/inventory-backend

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            export IMAGE=${{ secrets.DOCKER_USERNAME }}/inventory-backend:${{ github.ref_name }}

            docker compose down
            IMAGE=$IMAGE docker compose up -d --remove-orphans

            docker image prune -f

            docker ps
